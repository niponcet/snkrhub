<ion-content [fullscreen]="true" class="ion-no-padding">
  <div class="welcome-hero">
    <div class="bg-bars" id="bgBars">
      <!-- We will inject bars via TS -->
      @for (bar of bars(); track $index) {
        <span [style.height]="bar + '%'"></span>
      }
    </div>
    <div class="hero-logo">
      SNKRHUB
      <svg class="barcode" viewBox="0 0 24 20" width="24" height="20">
        <g fill="currentColor">
          <rect x="0" width="1.6" height="20" />
          <rect x="3" width="1" height="20" />
          <rect x="5.5" width="2.2" height="20" />
          <rect x="9" width="1" height="20" />
          <rect x="11.5" width="1.6" height="20" />
          <rect x="14.5" width="1" height="20" />
          <rect x="17" width="2.2" height="20" />
          <rect x="21" width="1" height="20" />
        </g>
      </svg>
    </div>
    <div class="hero-tag">TU COLECCIÓN. TU PORTAFOLIO.</div>
  </div>
  <div class="welcome-body">
    <h1>Guarda, sigue y valoriza cada par que tienes.</h1>
    <p>Crea tu cuenta para sincronizar tu inventario, activar alertas de precio y no perderte ningún lanzamiento.</p>
    
    <button class="btn-primary" (click)="goToSignUp()">Crear cuenta</button>
    <button class="btn-outline" (click)="goToSignIn()">Iniciar sesión</button>
  </div>
</ion-content>
