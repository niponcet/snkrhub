<ion-header>
  <ion-toolbar color="dark">
    <ion-title>SNKRHUB Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content color="light" [fullscreen]="true">
  <ion-grid>
    <ion-row class="ion-justify-content-center ion-align-items-center" style="height: 100%;">
      <ion-col size="12" size-md="8" size-lg="6">
        <ion-card>
          <ion-card-header>
            <ion-card-title>Sign In</ion-card-title>
          </ion-card-header>
          <ion-card-content>
            <form [formGroup]="formularioLogin" (ngSubmit)="ingresar()">
              <ion-item lines="none">
                <ion-icon name="person" slot="end" class="icon-login"></ion-icon>
                <ion-input label="Nombre / Email" label-placement="floating" fill="solid" placeholder="Nombre o email" formControlName="nombre"></ion-input>
              </ion-item>
              <ion-item lines="none">
                <ion-icon name="lock-closed" aria-hidden="true" slot="end" class="icon-login"></ion-icon>
                <ion-input label="Password" label-placement="floating" fill="solid" placeholder="password" formControlName="password" type="password"></ion-input>
              </ion-item>
              <ion-button color="dark" expand="full" type="submit" class="submit-button" [disabled]="cargando">Ingresar</ion-button>
            </form>
            <div class="register-container">
              <p class="register-text">Aún no tienes cuenta? <a [routerLink]="['/registro']">Regístrate</a></p>
            </div>

            <!-- mensaje de bienvenida al iniciar sesion -->
            @if (showWelcome) {
              <div class="welcome-message show">
                {{ welcomeMessage }}
              </div>
            }
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>

<ion-footer>
</ion-footer>
