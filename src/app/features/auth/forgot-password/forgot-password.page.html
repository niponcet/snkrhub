<ion-content [fullscreen]="true" class="ion-no-padding">
  <div class="form-top">
    <div class="back" (click)="goBack()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </div>
    <h1>{{ isEmailSent() ? 'Revisa tu correo' : 'Recuperar contraseña' }}</h1>
    <p>{{ isEmailSent() ? 'Te hemos enviado un enlace para restablecer tu contraseña. Revisa también tu carpeta de spam.' : 'Ingresa tu email y te enviaremos un enlace para restablecerla.' }}</p>
  </div>
  
  <div class="form-body">
    
    @if (!isEmailSent()) {
      <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
        <div class="field">
          <label>Email</label>
          <div class="input-wrap">
            <svg class="li" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="2" y="4" width="20" height="16" rx="2" />
              <path d="M2 6l10 7 10-7" />
            </svg>
            <input type="email" formControlName="email" placeholder="tucorreo@ejemplo.com">
          </div>
        </div>
        
        <button class="btn-primary" type="submit" [disabled]="forgotPasswordForm.invalid || isLoading()">
          {{ isLoading() ? 'Enviando...' : 'Enviar enlace' }}
        </button>
      </form>
    } @else {
      <!-- Success View -->
      <div class="success-box">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2">
          <path d="M22 11.08V12a10 10 0 11-5.93-9.14" />
          <path d="M22 4L12 14.01l-3-3" />
        </svg>
      </div>
      <button class="btn-primary" (click)="goBack()">Volver a inicio de sesión</button>
    }
  </div>
</ion-content>
