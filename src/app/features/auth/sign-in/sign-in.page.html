<ion-content [fullscreen]="true" class="ion-no-padding">
  <div class="form-top">
    <div class="back" (click)="goBack()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
        <path d="M15 18l-6-6 6-6" />
      </svg>
    </div>
    <h1>Bienvenido de vuelta</h1>
    <p>Inicia sesión para ver cómo va tu colección.</p>
  </div>
  
  <div class="form-body">
    <button class="btn-google" (click)="onGoogleSignIn()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#EA4335" d="M12.24 10.28L12.24 10.28v3.44h6.73c-.28 1.54-1.63 4.54-6.73 4.54-4.04 0-7.34-3.37-7.34-7.53s3.3-7.53 7.34-7.53c2.24 0 4.14.85 5.56 2.18l2.64-2.64C18.3 1.05 15.48 0 12.24 0 5.48 0 0 5.48 0 12.24s5.48 12.24 12.24 12.24c7.06 0 11.75-4.96 11.75-11.96 0-.82-.09-1.44-.19-2.24h-11.56z" />
        <path fill="#4285F4" d="M23.99 12.24c0-.82-.09-1.44-.19-2.24H12.24v4.44h6.73c-.28 1.54-1.63 4.54-6.73 4.54v3.68h6.24c3.65-3.36 5.51-8.31 5.51-10.42z" />
        <path fill="#FBBC05" d="M5.42 15.02c-.34-1.02-.53-2.11-.53-3.24 0-1.13.19-2.22.53-3.24V4.86H1.54C.56 6.8 0 8.97 0 11.28c0 2.31.56 4.48 1.54 6.42l3.88-2.68z" />
        <path fill="#34A853" d="M12.24 24.48c3.24 0 5.96-1.07 7.95-2.88l-4.32-3.35c-1.08.72-2.46 1.15-4.14 1.15-4.04 0-7.34-3.37-7.34-7.53H1.03v2.85c1.99 3.96 6.09 6.76 11.21 6.76z" />
      </svg>
      Continuar con Google
    </button>
    
    <div class="divider"><span>o</span></div>
    
    <form [formGroup]="signInForm" (ngSubmit)="onSubmit()">
      
      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <svg class="li" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="2" y="4" width="20" height="16" rx="2" />
            <path d="M2 6l10 7 10-7" />
          </svg>
          <input type="email" formControlName="email" placeholder="tucorreo@ejemplo.com">
        </div>
      </div>
      
      <div class="field">
        <label>Contraseña</label>
        <div class="input-wrap">
          <svg class="li" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="4" y="10" width="16" height="10" rx="2" />
            <path d="M8 10V7a4 4 0 018 0v3" />
          </svg>
          <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="Mínimo 8 caracteres">
          <svg class="eye" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" (click)="togglePassword()">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
        </div>
        <div class="forgot" (click)="goToForgotPassword()">¿Olvidaste tu contraseña?</div>
      </div>
      
      <button class="btn-primary" type="submit" [disabled]="signInForm.invalid || isLoading()">
        {{ isLoading() ? 'Iniciando...' : 'Iniciar sesión' }}
      </button>
      
      <div class="switch-line">¿No tienes cuenta? <a (click)="goToSignUp()">Crear una</a></div>
    </form>
  </div>
</ion-content>
