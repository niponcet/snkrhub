<ion-content [fullscreen]="true" class="snkrhub-content">
  <div class="screen-container">
    <div class="section-label" style="padding: 20px 20px 10px; font-size: 16px; font-weight: 800; color: #fff;">UPCOMING DROPS</div>

    <div class="filter-container" style="display: flex; gap: 10px; align-items: center; margin-bottom: 16px; padding: 0 20px;">
      <ion-button id="open-date-modal" fill="outline" color="light" style="flex: 1;">
        <ion-icon name="calendar-outline" slot="start"></ion-icon>
        {{ selectedDate() ? (selectedDate() | date:'dd MMM yyyy') : 'Filtrar por fecha' }}
      </ion-button>
    
      @if (selectedDate()) {
        <ion-button fill="clear" color="danger" (click)="clearDateFilter()">
          <ion-icon name="close-circle-outline" slot="icon-only"></ion-icon>
        </ion-button>
      }
    </div>

    <ion-modal trigger="open-date-modal" [keepContentsMounted]="true" initialBreakpoint="0.65" [breakpoints]="[0, 0.65, 1]">
      <ng-template>
        <ion-datetime 
          presentation="date" 
          [value]="selectedDate()"
          showDefaultButtons="true"
          doneText="Confirmar"
          cancelText="Cancelar"
          (ionChange)="onDateChange($event)">
        </ion-datetime>
      </ng-template>
    </ion-modal>

    <div class="premium-list">
      @for (rel of filteredDrops(); track rel.id) {
        <div class="premium-card">
          <div class="image-wrapper">
            <img [src]="rel.imageUrl" (error)="rel.imageUrl = 'https://placehold.co/600x400/1a1a1a/ff5722.png?text=Image+Not+Found'" style="width: 100%; height: 100%; object-fit: cover;" />
            <div class="date-badge">
              {{ rel.releaseDate | date:'dd MMM' | uppercase }}
            </div>
          </div>
          <div class="card-body">
            <h4 class="sneaker-title">{{ rel.sneakerName }}</h4>
            <p class="brand-name">{{ rel.brand }}</p>
            <div class="footer-row">
              <span class="retail-price">Retail: ${{ rel.price }}</span>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</ion-content>
