<div class="app-header">
  <div class="brand-row">
    <div class="brand">
      SNKRHUB
      <svg class="barcode" viewBox="0 0 24 14" width="24" height="14">
        <g fill="currentColor">
          <rect x="0" width="1.5" height="14" />
          <rect x="3" width="1" height="14" />
          <rect x="5.5" width="2" height="14" />
          <rect x="9" width="1" height="14" />
          <rect x="11.5" width="1.5" height="14" />
          <rect x="14.5" width="1" height="14" />
          <rect x="17" width="2" height="14" />
          <rect x="21" width="1" height="14" />
        </g>
      </svg>
    </div>
    <div class="header-actions">
      <button class="icon-btn" [routerLink]="['/notifications']" title="Notificaciones">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </button>
      <button class="icon-btn" [routerLink]="['/profile']" title="Perfil">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </button>
      <button class="scan-btn" (click)="onScanClick()" title="Escanear caja/zapatilla">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a0a02" stroke-width="2.4" stroke-linecap="round">
          <path d="M3 7V4h3M21 7V4h-3M3 17v3h3M21 17v3h-3M3 12h18" />
        </svg>
      </button>
    </div>
  </div>
  <div class="ticker">
    <div class="ticker-track">
      <span>AJ1 Chicago <span class="up">+2.4%</span></span>
      <span>Yeezy 350 Zebra <span class="up">+1.1%</span></span>
      <span>Dunk Low Panda <span class="down">-0.8%</span></span>
      <span>AJ4 Bred <span class="up">+3.9%</span></span>
      <span>Air Max Plus <span class="up">+0.6%</span></span>
      <span>Samba OG <span class="down">-1.4%</span></span>
      <span>AJ1 Chicago <span class="up">+2.4%</span></span>

      <span>Air Max Plus <span class="up">+0.6%</span></span>
      <span>Samba OG <span class="down">-1.4%</span></span>
    </div>
  </div>
</div>
