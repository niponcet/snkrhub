<ion-modal #ionModal [isOpen]="isOpen()" (didDismiss)="close()" class="snkrhub-sheet-modal">
  <ng-template>
    <div class="sheet">
      <div class="drag-handle"></div>
      
      <div class="sheet-head">
        <h3>Agregar par</h3>
        <div class="close-btn" (click)="close()" title="Cerrar modal">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
            <path d="M18 6L6 18M6 6l12 12" />
          </svg>
        </div>
      </div>

      <div class="mode-switch">
        <button [ngClass]="{'active': mode() === 'scan'}" (click)="setMode('scan')" type="button">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M3 7V4h3M21 7V4h-3M3 17v3h3M21 17v3h-3M3 12h18" />
          </svg>
          ESCANEAR
        </button>
        <button [ngClass]="{'active': mode() === 'manual'}" (click)="setMode('manual')" type="button">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M12 20h9" />
            <path d="M16.5 3.5a2.1 2.1 0 013 3L7 19l-4 1 1-4z" />
          </svg>
          MANUAL
        </button>
      </div>

      <div class="sheet-body">
        <!-- SCAN PANEL -->
        @if (mode() === 'scan') {
          <div class="panel active">
            <div class="scan-frame" (click)="triggerHardwareScan()" title="Haz clic para iniciar el escáner de cámara">
              <div class="scan-box">
                <div class="scan-line"></div>
              </div>
            </div>
            <div class="scan-hint">Apunta la cámara al código de barras de la caja</div>
            
            <div style="text-align: center; margin-bottom: 16px;">
              <button class="scan-trigger-btn" (click)="triggerHardwareScan()" type="button">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
                  <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                  <circle cx="12" cy="13" r="4"></circle>
                </svg>
                {{ isScanning() ? 'Escaneando...' : 'Abrir Cámara / Escáner' }}
              </button>
            </div>

            @if (scannedCode()) {
              <div class="scan-result" (click)="addFromScan()">
                <div class="thumb"></div>
                <div>
                  <h4>Código Detectado</h4>
                  <div class="sku">SKU {{ scannedCode() }} · Toca para continuar</div>
                </div>
                <svg class="check" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4">
                  <path d="M20 6L9 17l-5-5" />
                </svg>
              </div>
            }
          </div>
        }

        <!-- MANUAL PANEL -->
        @if (mode() === 'manual') {
          <div class="panel active">
            <div class="upload-box">
              <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <rect x="3" y="5" width="18" height="15" rx="2" />
                <circle cx="9" cy="11" r="2" />
                <path d="M21 16l-5-5-4 4-3-3-6 6" />
              </svg>
              <div class="t1">Subir foto del par</div>
              <div class="t2">JPG o PNG, máx. 10MB</div>
            </div>

            <div class="field">
              <label>Marca</label>
              <select [ngModel]="brand()" (ngModelChange)="brand.set($event)">
                <option value="Nike">Nike</option>
                <option value="Jordan">Jordan</option>
                <option value="Adidas">Adidas</option>
                <option value="New Balance">New Balance</option>
                <option value="Yeezy">Yeezy</option>
                <option value="Asics">Asics</option>
                <option value="Puma">Puma</option>
                <option value="Otro">Otro</option>
              </select>
            </div>

            <div class="field">
              <label>Modelo</label>
              <input type="text" [ngModel]="model()" (ngModelChange)="model.set($event)" placeholder='Ej. Dunk Low "Panda Reverse"'>
            </div>

            <div class="row-2">
              <div class="field">
                <label>Talla (US)</label>
                <input type="text" [ngModel]="size()" (ngModelChange)="size.set($event)" placeholder="9.5">
              </div>
              <div class="field">
                <label>Precio compra</label>
                <div class="price-input">
                  <span>CLP</span>
                  <input type="number" [ngModel]="price()" (ngModelChange)="price.set($event)" placeholder="109990">
                </div>
              </div>
            </div>

            <div class="field">
              <label>Condición</label>
              <div class="chip-select">
                <div class="chip-opt" [ngClass]="{'active': condition() === 'DS'}" (click)="setCondition('DS')">DS</div>
                <div class="chip-opt" [ngClass]="{'active': condition() === 'VNDS'}" (click)="setCondition('VNDS')">VNDS</div>
                <div class="chip-opt" [ngClass]="{'active': condition() === 'Usado'}" (click)="setCondition('Usado')">Usado</div>
              </div>
            </div>

            <div class="fav-toggle" (click)="toggleFavorite()">
              <div class="l">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--orange)" stroke-width="2">
                  <path d="M12 21s-7-4.5-9.5-9C1 8 2.5 4.5 6 4c2-.3 4 .8 6 3 2-2.2 4-3.3 6-3 3.5.5 5 4 3.5 8-2.5 4.5-9.5 9-9.5 9z" />
                </svg>
                Marcar como favorito
              </div>
              <div class="switch-track" [ngClass]="{'off': !isFavorite()}"></div>
            </div>
          </div>
        }
      </div>

      <div class="sheet-footer">
        <button class="save-btn" (click)="savePair()" type="button">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#1a0a02" stroke-width="2.4">
            <path d="M20 6L9 17l-5-5" />
          </svg>
          Agregar a mi colección
        </button>
      </div>
    </div>
  </ng-template>
</ion-modal>
